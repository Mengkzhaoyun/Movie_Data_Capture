name: Build Images

on:
  push:
    branches:
      - main

env:
  VERSION: v6.7.2
  REGISTRY: registry.cn-qingdao.aliyuncs.com
  IMAGE: wod/movie_data_capture

jobs:
  build-amd64:
    name: Build AMD64
    runs-on: ubuntu-latest
    environment: REGISTRY_USER_ALIYUN
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile amd64 binary
        run: |
          docker run --rm --platform linux/amd64 -e APP_VERSION=${{ env.VERSION }} -v ${{ github.workspace }}:/build -w /build python:3.12-bookworm bash scripts/build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-amd64
          build-args: |
            BASE=debian:bookworm-slim

  build-arm64:
    name: Build ARM64
    needs: build-amd64
    runs-on: ubuntu-latest
    environment: REGISTRY_USER_ALIYUN
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Compile arm64 binary
        run: |
          docker run --rm --platform linux/arm64 -e APP_VERSION=${{ env.VERSION }} -v ${{ github.workspace }}:/build -w /build python:3.12-bookworm bash scripts/build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-arm64
          build-args: |
            BASE=debian:bookworm-slim

  create-manifest:
    name: Create Multi-Arch Manifest
    needs: build-arm64
    runs-on: ubuntu-latest
    environment: REGISTRY_USER_ALIYUN
    steps:
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-arm64
