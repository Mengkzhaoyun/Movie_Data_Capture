name: Build Images

on:
  push:
    branches:
      - main

env:
  VERSION: v6.7.1
  REGISTRY: registry.cn-qingdao.aliyuncs.com
  IMAGE: wod/movie_data_capture

jobs:
  compile:
    name: Compile Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Compile amd64
        run: |
          docker run --rm --platform linux/amd64 -v ${{ github.workspace }}:/build -w /build python:3.12-bookworm /bin/bash -c " \
            pip install --upgrade pip pyinstaller && \
            pip install -r requirements.txt && \
            pip install --no-deps face_recognition && \
            pyinstaller -D src/main.py -n Movie_Data_Capture --python-option u --noconfirm \
              --hidden-import \"image_processing.cnn\" \
              --hidden-import \"adc_function\" \
              --hidden-import \"core\" \
              --add-data \"\$(python -c 'import cloudscraper as _; print(_.__path__[0])' | tail -n 1):cloudscraper\" \
              --add-data \"\$(python -c 'import opencc as _; print(_.__path__[0])' | tail -n 1):opencc\" \
              --add-data \"\$(python -c 'import face_recognition_models as _; print(_.__path__[0])' | tail -n 1):face_recognition_models\" \
              --add-data \"src/img:img\" \
              --add-data \"scrapinglib:scrapinglib\""

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries-amd64
          path: dist/Movie_Data_Capture

      - name: Clean dist for next build
        run: rm -rf dist build

      - name: Compile arm64
        run: |
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/build -w /build python:3.12-bookworm /bin/bash -c " \
            pip install --upgrade pip pyinstaller && \
            pip install -r requirements.txt && \
            pip install --no-deps face_recognition && \
            pyinstaller -D src/main.py -n Movie_Data_Capture --python-option u --noconfirm \
              --hidden-import \"image_processing.cnn\" \
              --hidden-import \"adc_function\" \
              --hidden-import \"core\" \
              --add-data \"\$(python -c 'import cloudscraper as _; print(_.__path__[0])' | tail -n 1):cloudscraper\" \
              --add-data \"\$(python -c 'import opencc as _; print(_.__path__[0])' | tail -n 1):opencc\" \
              --add-data \"\$(python -c 'import face_recognition_models as _; print(_.__path__[0])' | tail -n 1):face_recognition_models\" \
              --add-data \"src/img:img\" \
              --add-data \"scrapinglib:scrapinglib\""

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries-arm64
          path: dist/Movie_Data_Capture

  build:
    name: Build Images
    needs: compile
    runs-on: ubuntu-latest
    environment: REGISTRY_USER_ALIYUN
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-binaries-*
          path: build_artifacts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-amd64
          build-args: |
            BASE=${{ env.REGISTRY }}/wod/debian:bookworm-slim-amd64

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-arm64
          build-args: |
            BASE=${{ env.REGISTRY }}/wod/debian:bookworm-slim-arm64

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-arm64
